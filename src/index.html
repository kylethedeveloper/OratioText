<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OratioText</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark theme">
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454l0 .008" /></svg>
        <svg id="icon-sun" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" /><path d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7" /></svg>
      </button>
      <div class="logo-area">
        <img src="appicon.png" alt="OratioText" class="app-icon" />
        <h1>OratioText</h1>
      </div>
      <p class="tagline">Speech to Text — runs entirely on your computer</p>
    </header>

    <main class="app-main">
      <!-- File Selection -->
      <section class="card file-section">
        <label class="section-label">Audio / Video File</label>
        <div class="file-picker">
          <input type="text" id="file-path" placeholder="Select a file..." readonly />
          <button id="browse-btn" class="btn btn-secondary">Browse</button>
        </div>
      </section>

      <!-- Model Selection -->
      <section class="card model-section">
        <label class="section-label">Whisper Model</label>
        <div class="model-picker">
          <select id="model-select">
            <option value="" disabled selected>Loading models...</option>
          </select>
          <button id="download-btn" class="btn btn-secondary" disabled>Download</button>
        </div>
        <div id="download-progress" class="progress-bar hidden">
          <div class="progress-fill" id="progress-fill"></div>
          <span class="progress-text" id="progress-text">0%</span>
        </div>
        <p class="model-info" id="model-info"></p>
      </section>

      <!-- Generate / Stop -->
      <section class="action-section">
        <div class="model-picker">
          <select id="language-select">
            <option value="auto" selected>Auto-Detect</option>
            <option value="ar">Arabic</option>
            <option value="zh">Chinese</option>
            <option value="cs">Czech</option>
            <option value="da">Danish</option>
            <option value="nl">Dutch</option>
            <option value="en">English</option>
            <option value="fi">Finnish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="el">Greek</option>
            <option value="he">Hebrew</option>
            <option value="hi">Hindi</option>
            <option value="hu">Hungarian</option>
            <option value="id">Indonesian</option>
            <option value="it">Italian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="no">Norwegian</option>
            <option value="pl">Polish</option>
            <option value="pt">Portuguese</option>
            <option value="ro">Romanian</option>
            <option value="ru">Russian</option>
            <option value="es">Spanish</option>
            <option value="sv">Swedish</option>
            <option value="th">Thai</option>
            <option value="tr">Turkish</option>
            <option value="uk">Ukrainian</option>
            <option value="vi">Vietnamese</option>
          </select>
        </div>
        <button id="generate-btn" class="btn btn-primary" disabled>
          Generate Transcription
        </button>
        <button id="stop-btn" class="btn btn-danger hidden">
          Stop
        </button>
      </section>

      <!-- Transcription Output -->
      <section class="card output-section">
        <div class="output-header">
          <label class="section-label">Transcription</label>
          <div class="output-controls">
            <label class="checkbox-label">
              <input type="checkbox" id="timestamps-toggle" checked />
              <span>Timestamps</span>
            </label>
            <button id="save-btn" class="btn btn-secondary btn-sm" disabled>
              Save
            </button>
          </div>
        </div>
        <div id="transcription-output" class="output-area">
          <p class="placeholder-text">Transcription will appear here...</p>
        </div>
      </section>

      <!-- Status -->
      <div id="status-bar" class="status-bar hidden">
        <div class="spinner"></div>
        <span id="status-text">Processing...</span>
      </div>

      <!-- Language info -->
      <div id="language-info" class="language-info hidden">
        <span id="language-text"></span>
      </div>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
