name: Release OratioText

on:
  push:
    tags:
      - 'v*'

jobs:
  release-macos-arm64:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin

    - name: Install system dependencies (macOS)
      run: brew install ffmpeg

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Evaluate pre-release status
      id: prerelease
      run: |
        if [[ "${{ github.ref_name }}" == *"-rc"* || "${{ github.ref_name }}" == *"-beta"* || "${{ github.ref_name }}" == *"-alpha"* ]]; then
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Build and Publish Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CFLAGS: "-mcpu=apple-m1 -U__ARM_FEATURE_MATMUL_INT8"
        CXXFLAGS: "-mcpu=apple-m1 -U__ARM_FEATURE_MATMUL_INT8"
      with:
        args: "--target aarch64-apple-darwin --bundles dmg"
        tagName: ${{ github.ref_name }}
        releaseName: "OratioText ${{ github.ref_name }}"
        releaseBody: "Download the attached assets to install OratioText."
        releaseDraft: false
        prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}

  release-macos-x86_64:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-apple-darwin

    - name: Install system dependencies (macOS)
      run: brew install ffmpeg

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Evaluate pre-release status
      id: prerelease
      run: |
        if [[ "${{ github.ref_name }}" == *"-rc"* || "${{ github.ref_name }}" == *"-beta"* || "${{ github.ref_name }}" == *"-alpha"* ]]; then
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Build and Publish Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: "--target x86_64-apple-darwin --bundles dmg"
        tagName: ${{ github.ref_name }}
        releaseName: "OratioText ${{ github.ref_name }}"
        releaseBody: "Download the attached assets to install OratioText."
        releaseDraft: false
        prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}

  release-windows-x86_64:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Install system dependencies (Windows)
      run: choco install ffmpeg -y

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Evaluate pre-release status
      id: prerelease
      run: |
        if [[ "${{ github.ref_name }}" == *"-rc"* || "${{ github.ref_name }}" == *"-beta"* || "${{ github.ref_name }}" == *"-alpha"* ]]; then
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Build and Publish Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: "--target x86_64-pc-windows-msvc"
        tagName: ${{ github.ref_name }}
        releaseName: "OratioText ${{ github.ref_name }}"
        releaseBody: "Download the attached assets to install OratioText."
        releaseDraft: false
        prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}

  release-linux-x86_64:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu

    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          librsvg2-dev \
          patchelf \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          ffmpeg

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Evaluate pre-release status
      id: prerelease
      run: |
        if [[ "${{ github.ref_name }}" == *"-rc"* || "${{ github.ref_name }}" == *"-beta"* || "${{ github.ref_name }}" == *"-alpha"* ]]; then
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Build and Publish Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: "--target x86_64-unknown-linux-gnu --bundles deb,appimage"
        tagName: ${{ github.ref_name }}
        releaseName: "OratioText ${{ github.ref_name }}"
        releaseBody: "Download the attached assets to install OratioText."
        releaseDraft: false
        prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
