name: Release OratioText

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
      
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            args: "--target aarch64-apple-darwin --bundles dmg"
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
            args: "--target x86_64-apple-darwin --bundles dmg"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            args: "--target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ffmpeg

    - name: Install system dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install ffmpeg -y

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Evaluate pre-release status
      id: prerelease
      run: |
        if [[ "${{ github.ref_name }}" == *"-rc"* || "${{ github.ref_name }}" == *"-beta"* || "${{ github.ref_name }}" == *"-alpha"* ]]; then
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Build and Publish Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: ${{ matrix.args }}
        tagName: ${{ github.ref_name }}
        releaseName: "OratioText ${{ github.ref_name }}"
        releaseBody: "Download the attached assets to install OratioText."
        releaseDraft: false
        prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
