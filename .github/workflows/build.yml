name: Build OratioText

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-26-intel
            target: x86_64-apple-darwin
            name: macos-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ffmpeg

    - name: Install system dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install ffmpeg -y

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: --target ${{ matrix.target }}
        tagName: ${{ github.event_name == 'release' && github.ref_name || '' }}
        releaseName: ${{ github.event_name == 'release' && github.ref_name || '' }}
        releaseBody: ''
        releaseDraft: false
        prerelease: false

    - name: Upload build artifacts
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: OratioText-${{ matrix.name }}
        path: |
          src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
          src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
          src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe