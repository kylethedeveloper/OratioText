name: Build OratioText

on:
  push:
    branches: [ develop ]
  # pull_request:
  #   branches: [ master ]

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin

    - name: Install system dependencies (macOS)
      run: brew install ffmpeg

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CFLAGS: "-mcpu=apple-m1 -U__ARM_FEATURE_MATMUL_INT8"
        CXXFLAGS: "-mcpu=apple-m1 -U__ARM_FEATURE_MATMUL_INT8"
      with:
        args: "--target aarch64-apple-darwin --bundles dmg"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OratioText-macos-arm64
        path: src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg

  build-macos-x86_64:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-apple-darwin

    - name: Install system dependencies (macOS)
      run: brew install ffmpeg

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: "--target x86_64-apple-darwin --bundles dmg"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OratioText-macos-x86_64
        path: src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Install system dependencies (Windows)
      run: choco install ffmpeg -y

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: "--target x86_64-pc-windows-msvc"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OratioText-windows-x86_64
        path: |
          src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe

  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu

    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          ffmpeg

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Build Tauri app
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: "--target x86_64-unknown-linux-gnu --bundles deb,appimage"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OratioText-linux-x86_64
        path: |
          src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
          src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage